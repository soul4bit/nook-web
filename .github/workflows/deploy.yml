name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -euo pipefail
            APP_DIR=/var/www/kontur-znaniy
            SERVICE_NAME=kontur-znaniy
            SYSTEMCTL_BIN="$(command -v systemctl)"

            run_systemctl() {
              if [ "$(id -u)" -eq 0 ]; then
                "${SYSTEMCTL_BIN}" "$@"
              else
                if ! sudo -n "${SYSTEMCTL_BIN}" "$@"; then
                  echo "ERROR: user '$USER' cannot run systemctl without password."
                  echo "Use DEPLOY_USER=root or configure NOPASSWD sudo for systemctl."
                  exit 1
                fi
              fi
            }

            cd "${APP_DIR}"
            git fetch --prune origin main
            git reset --hard FETCH_HEAD
            mkdir -p bin data
            export GOTOOLCHAIN=auto
            go version
            GOFLAGS=-mod=mod go mod download
            GOFLAGS=-mod=mod go build -trimpath -ldflags="-s -w" -o ./bin/kontur-znaniy ./cmd/server

            run_systemctl restart "${SERVICE_NAME}"
            run_systemctl status "${SERVICE_NAME}" --no-pager
